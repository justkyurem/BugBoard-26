<div class="container">
  <div class="header">
    <h1>Gestione Utenti</h1>
    <button class="btn-create" (click)="openCreateForm()">+ Aggiungi Utente</button>
  </div>

  <div class="table-wrapper">
    <div class="loading-state" *ngIf="isLoading">
      <div class="spinner"></div>
      <p>Caricamento utenti in corso...</p>
    </div>

    <table class="user-table" *ngIf="!isLoading">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Cognome</th>
          <th>Email</th>
          <th>Ruolo</th>
          <th>Azioni</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users">
          <td>#{{ user.id }}</td>
          <td>{{ user.name }}</td>
          <td>{{ user.surname }}</td>
          <td>{{ user.email }}</td>
          <td>
            <span class="badge" [class.badge-admin]="user.role === 'ADMIN'">
              {{ user.role }}
            </span>
          </td>
          <td class="actions">
            <button class="btn-action edit" (click)="openEditForm(user)" title="Modifica">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
              </svg>
            </button>
            <button class="btn-action delete" (click)="deleteUser(user.id)" title="Elimina">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              </svg>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Modal Form -->
  <div class="modal" *ngIf="showForm">
    <div class="modal-content">
      <div class="modal-header">
        <h2>{{ isEditMode ? 'Modifica Utente' : 'Nuovo Utente' }}</h2>
        <button class="close-btn" (click)="closeForm()">×</button>
      </div>
      <form (ngSubmit)="saveUser()">
        <div class="form-group">
          <label>Nome:</label>
          <input type="text" [(ngModel)]="userForm.name" name="name" required>
        </div>
        <div class="form-group">
          <label>Cognome:</label>
          <input type="text" [(ngModel)]="userForm.surname" name="surname" required>
        </div>
        <div class="form-group">
          <label>Email:</label>
          <input type="email" [(ngModel)]="userForm.email" name="email" required>
        </div>
        <div class="form-group">
          <label>Password{{ isEditMode ? ' (lascia vuoto per non modificare)' : '' }}:</label>
          <input type="password" [(ngModel)]="userForm.password" name="password" [required]="!isEditMode">
        </div>
        <div class="form-group">
          <label>Ruolo:</label>
          <select [(ngModel)]="userForm.role" name="role" required>
            <option [value]="Role.STANDARD">STANDARD</option>
            <option [value]="Role.ADMIN">ADMIN</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-cancel" (click)="closeForm()">Annulla</button>
          <button type="submit" class="btn-save">Salva</button>
        </div>
      </form>
    </div>
  </div>
</div>

<app-confirm-modal *ngIf="showConfirmDelete" title="Elimina Utente"
  message="Sei sicuro di voler eliminare questo utente? L'operazione non può essere annullata."
  confirmText="Sì, elimina" cancelText="Annulla" (confirm)="confirmDelete()" (cancel)="cancelDelete()">
</app-confirm-modal>
