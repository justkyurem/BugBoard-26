<div class="notifications-container">
    <button class="btn-back" (click)="goBack()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Torna alla Board
    </button>

    <div class="header">
        <h2>Le mie notifiche</h2>
        <div class="header-actions-right">
            <button class="btn-read-all" (click)="markAllAsRead()" *ngIf="hasUnread">
                Segna tutte come lette
            </button>
            <button class="btn-delete-all" (click)="promptDeleteAll()"
                *ngIf="notifications && notifications.length > 0">
                Elimina notifiche
            </button>
        </div>
    </div>

    <div *ngIf="notifications.length === 0" class="empty-state">
        Nessuna notifica per ora!!
    </div>

    <ul class="notification-list">
        <li *ngFor="let n of notifications" class="notification-item" [class.unread]="!n.read" (click)="markAsRead(n)">
            <span class="dot" *ngIf="!n.read">●</span>
            <div class="content">
                <p class="message">{{ n.message }}</p>
                <span class="date">{{ n.createdAt | date:'dd/MM/yyyy HH:mm' }}</span>
            </div>
        </li>
    </ul>

    <app-confirm-modal *ngIf="showConfirmDelete" title="Elimina Notifiche"
        message="Sei sicuro di voler eliminare tutte le tue notifiche? L'operazione non può essere annullata."
        confirmText="Sì, elimina" cancelText="Annulla" (confirm)="confirmDeleteAll()" (cancel)="cancelDeleteAll()">
    </app-confirm-modal>
</div>
