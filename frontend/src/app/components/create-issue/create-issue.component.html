<div class="create-container">
    <button routerLink="/" class="btn-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Torna alla Board
    </button>

    <h1>📝 Nuova Segnalazione</h1>

    <form (ngSubmit)="onSubmit()" #issueForm="ngForm">

        <div class="form-group">
            <label>Titolo del problema</label>
            <input type="text" [(ngModel)]="issue.title" name="title" required minlength="5"
                placeholder="Es. Errore nel login o Schermata bianca" #titleField="ngModel">
            <span class="field-error" *ngIf="titleField.invalid && titleField.touched">
                <span *ngIf="titleField.errors?.['required']">Il titolo è obbligatorio.</span>
                <span *ngIf="titleField.errors?.['minlength']">Il titolo deve contenere almeno 5 caratteri.</span>
            </span>
        </div>

        <div class="form-group">
            <label>Descrizione dettagliata</label>
            <textarea [(ngModel)]="issue.description" name="description" rows="5" required minlength="10"
                placeholder="Fornisci quanti più dettagli possibili per aiutarci a riprodurre il problema..."
                #descField="ngModel"></textarea>
            <span class="field-error" *ngIf="descField.invalid && descField.touched">
                <span *ngIf="descField.errors?.['required']">La descrizione è obbligatoria.</span>
                <span *ngIf="descField.errors?.['minlength']">La descrizione deve contenere almeno 10 caratteri.</span>
            </span>
        </div>

        <div class="form-group">
            <label>Allega Immagine (Opzionale)</label>
            <input type="file" (change)="onFileSelected($event)" accept="image/*">
        </div>

        <div class="row">
            <div class="form-group">
                <label>Priorità</label>
                <select [(ngModel)]="issue.priority" name="priority">
                    <option *ngFor="let p of priorities" [value]="p">{{ p }}</option>
                </select>
            </div>

            <div class="form-group">
                <label>Tipo di Segnalazione</label>
                <select [(ngModel)]="issue.type" name="type">
                    <option *ngFor="let t of types" [value]="t">{{ t }}</option>
                </select>
            </div>
        </div>

        <div class="actions">
            <button type="button" routerLink="/" class="btn-cancel">Annulla</button>
            <button type="submit" class="btn-submit" [disabled]="!issueForm.form.valid">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Crea Ticket
            </button>
        </div>

    </form>
</div>
