# --- CONFIGURAZIONE DATABASE (PostgreSQL - Docker) ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Aggiorna il DB automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- CONFIGURAZIONE JWT ---
# La chiave segreta è definita come variabile d'ambiente (mai committare il valore reale)
application.security.jwt.secret-key=${JWT_SECRET}

# Durata del token in millisecondi (86400000 = 1 giorno)
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}
application.security.jwt.refresh-token.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# --- CONFIGURAZIONE UPLOAD FILE ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
